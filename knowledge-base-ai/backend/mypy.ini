[mypy]
python_version = 3.11
strict = True
warn_return_any = True
warn_unused_configs = True

# Third-party packages without type stubs
[mypy-structlog]
ignore_missing_imports = True

[mypy-structlog.*]
ignore_missing_imports = True

[mypy-sentence_transformers]
ignore_missing_imports = True

[mypy-sentence_transformers.*]
ignore_missing_imports = True

[mypy-fitz]
ignore_missing_imports = True

[mypy-fitz.*]
ignore_missing_imports = True

[mypy-chromadb]
follow_imports = skip

[mypy-chromadb.*]
follow_imports = skip

[mypy-docx]
ignore_missing_imports = True

[mypy-docx.*]
ignore_missing_imports = True

[mypy-openpyxl]
ignore_missing_imports = True

[mypy-openpyxl.*]
ignore_missing_imports = True
